services:
  web:
    image: nginx:alpine
    container_name: app-one-nginx
    ports:
      - "8080:80"
    restart: unless-stopped

  cache:
    image: redis:alpine
    container_name: app-one-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Crashes on purpose
  crash:
    image: alpine:latest
    container_name: app-one-crash
    command: ["sh", "-c", "echo 'Starting up...' && sleep 10 && echo 'FATAL: Failed to connect to database' >&2 && echo 'ERROR: Connection timeout after 10s' >&2 && echo 'ERROR: Exiting with failure' >&2 && exit 1"]
    restart: "no"
